# Local dev stack. Production deploys would use the per-service Dockerfiles
# and a separate compose/helm topology — this file is for `make up`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pulseroute
      POSTGRES_USER: pulseroute
      POSTGRES_PASSWORD: pulseroute
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pulseroute"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports: ["8123:8123", "9000:9000"]
    environment:
      CLICKHOUSE_DB: pulseroute
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
    volumes:
      - chdata:/var/lib/clickhouse

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PULSEROUTE_POSTGRES_DSN: postgresql+asyncpg://pulseroute:pulseroute@postgres:5432/pulseroute
      PULSEROUTE_REDIS_URL: redis://redis:6379/0
      PULSEROUTE_CLICKHOUSE_URL: http://clickhouse:8123
      PULSEROUTE_USE_FAKE_PROVIDER: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

volumes:
  pgdata:
  chdata:
